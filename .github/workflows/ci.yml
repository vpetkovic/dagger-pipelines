name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test Pipeline Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test restore
        uses: dagger/dagger-for-github@v7
        with:
          verb: call
          version: "0.20.3"
          args: test-restore

      - name: Test build
        uses: dagger/dagger-for-github@v7
        with:
          verb: call
          version: "0.20.3"
          args: test-build

      - name: Test test
        uses: dagger/dagger-for-github@v7
        with:
          verb: call
          version: "0.20.3"
          args: test-test

      - name: Test pack
        uses: dagger/dagger-for-github@v7
        with:
          verb: call
          version: "0.20.3"
          args: test-pack

      - name: Test CI pipeline (end-to-end)
        uses: dagger/dagger-for-github@v7
        with:
          verb: call
          version: "0.20.3"
          args: test-ci
